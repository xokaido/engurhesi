<!doctype html>
<html lang="ka">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>%sveltekit.status% — engurhesi.ge</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          'FiraGO', 'Noto Sans Georgian', 'Noto Sans', 'Helvetica Neue', Arial, system-ui,
          sans-serif;
        color: #10202e;
        background:
          radial-gradient(120% 160% at 100% 0%, rgb(8 145 178 / 0.35) 0%, transparent 55%),
          linear-gradient(160deg, #072a42 0%, #0b3c5d 65%, #0d4a70 100%);
        padding: 1.5rem;
      }
      .card {
        width: 100%;
        max-width: 30rem;
        background: #fff;
        border-radius: 1rem;
        padding: 2.5rem 2rem;
        text-align: center;
        box-shadow: 0 32px 80px -24px rgb(0 0 0 / 0.6);
      }
      .mark {
        margin-bottom: 1rem;
      }
      .status {
        font-size: 4.5rem;
        font-weight: 800;
        line-height: 1;
        margin: 0 0 0.5rem;
        color: #0b3c5d;
        letter-spacing: -0.02em;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.625rem;
        color: #072a42;
      }
      p {
        margin: 0 0 0.375rem;
        color: #5c718a;
        font-size: 0.9375rem;
        line-height: 1.6;
      }
      .msg {
        font-size: 0.8125rem;
        color: #8ba0b5;
        word-break: break-word;
      }
      a.btn {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.75rem 1.75rem;
        background: #0b3c5d;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        border-radius: 0.5rem;
      }
      a.btn:hover {
        background: #11527d;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <svg class="mark" viewBox="0 0 40 40" width="52" height="52" aria-hidden="true">
        <defs>
          <linearGradient id="em" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0891b2" />
            <stop offset="1" stop-color="#072a42" />
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="9" fill="url(#em)" />
        <path
          d="M7 29 Q 20 7 33 29"
          fill="none"
          stroke="#67e8f9"
          stroke-width="3.25"
          stroke-linecap="round"
        />
        <path
          d="M12.5 29 Q 20 15.5 27.5 29"
          fill="none"
          stroke="#fff"
          stroke-width="2"
          stroke-linecap="round"
          opacity="0.9"
        />
        <path
          d="M6 33.5 h28"
          stroke="#67e8f9"
          stroke-width="2.25"
          stroke-linecap="round"
          opacity="0.75"
        />
      </svg>
      <p class="status">%sveltekit.status%</p>
      <h1>დაფიქსირდა შეცდომა · Something went wrong</h1>
      <p>სცადეთ თავიდან რამდენიმე წუთში. · Please try again in a few minutes.</p>
      <p class="msg">%sveltekit.error.message%</p>
      <a class="btn" href="/ka">engurhesi.ge</a>
    </main>
  </body>
</html>
